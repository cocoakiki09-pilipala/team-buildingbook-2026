<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Building 旗艦版手冊</title>
    <style>
        :root {
            --desk-bg: #dcdde1; --paper-bg: #f5f6fa; --main-theme: #84a59d;
            --pink-theme: #ffb7b2; --pink-active: #ff9aa2;
            --text-main: #2f3640; --text-sub: #7f8c8d; --accent-tan: #faf3e0;
        }
        html { overflow-y: scroll; scroll-behavior: smooth; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--desk-bg); margin: 0; padding: 0; display: flex; justify-content: center; color: var(--text-main); }
        .notebook { display: flex; width: 100%; max-width: 1050px; min-height: 100vh; position: relative; }
        .paper { flex: 1; background: var(--paper-bg); padding: 35px; overflow-y: auto; z-index: 2; padding-bottom: 120px; box-sizing: border-box; }
        .cover-box { width: 100%; height: 220px; border-radius: 15px; overflow: hidden; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: #eee; }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; }
        .tabs { display: flex; flex-direction: column; gap: 8px; margin-top: 50px; z-index: 10; }
        .tab { writing-mode: vertical-rl; text-orientation: mixed; padding: 30px 12px; border: none; background: #b2bec3; color: white; cursor: pointer; border-radius: 0 15px 15px 0; transition: 0.3s; position: relative; left: -2px; font-weight: bold; font-size: 1.1em; }
        .tab.active { background: var(--main-theme); padding-left: 20px; z-index: 11; }
        .tab-pink.active { background-color: var(--pink-active) !important; }
        .ticket { background: white; border-radius: 20px; display: flex; position: relative; margin-bottom: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); min-height: 150px; overflow: hidden; }
        .line { position: absolute; left: 70%; top: 15px; bottom: 15px; border-left: 2px dashed #ececec; transform: translateX(-50%); }
        .ticket::before, .ticket::after { content: ''; position: absolute; width: 24px; height: 24px; background: var(--paper-bg); border-radius: 50%; left: 70%; transform: translateX(-50%); z-index: 5; }
        .ticket::before { top: -12px; } .ticket::after { bottom: -12px; }
        .t-left { flex: 0 0 70%; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
        .t-route { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .t-city { font-size: 1.6em; font-weight: bold; color: var(--main-theme); }
        .t-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .t-label { font-size: 0.7em; color: var(--text-sub); display: block; margin-bottom: 3px; }
        .t-val { font-size: 0.9em; font-weight: bold; }
        .t-right { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: center; background: #fafafa; text-align: center; border-left: 1px solid #f0f0f0; }
        .day-title { background: var(--main-theme); color: white; padding: 12px 20px; border-radius: 10px 10px 0 0; margin-top: 25px; font-weight: bold; }
        .sched-container { background: white; border-radius: 0 0 15px 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .sched-item { display: flex; border-bottom: 1px solid #f0f0f0; }
        .time-box { width: 90px; padding: 15px; background: #fcfcfc; border-right: 1px solid #eee; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--main-theme); font-weight: bold; font-size: 0.85em; }
        .content-box { flex: 1; padding: 15px 20px; }
        .loc-tag { display: inline-block; background: var(--accent-tan); color: #8b7355; padding: 4px 10px; border-radius: 6px; font-size: 0.85em; margin-top: 8px; text-decoration: none; border: 1px solid #e2d1b3; }
        .transit-row { display: flex; align-items: center; padding: 12px 20px; background: #f8f9fa; font-size: 0.85em; color: var(--text-sub); border-bottom: 1px solid #eee; }
        .luggage-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .luggage-cat { background: white; border: 1px solid #eee; padding: 20px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .luggage-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.95em; }
        .luggage-item input { margin-right: 10px; }
        @media (max-width: 768px) {
            .tabs { flex-direction: row !important; position: fixed !important; bottom: 0 !important; left: 0; width: 100%; height: 70px; background: white; box-shadow: 0 -3px 15px rgba(0,0,0,0.1); z-index: 9999; display: flex; }
            .tab { writing-mode: horizontal-tb; flex: 1; border-radius: 0; padding: 0; font-size: 0.9em; text-align: center; color: #666; background: white; display: flex; align-items: center; justify-content: center; }
            .tab.active { background: var(--main-theme); color: white; }
            .paper { padding: 20px 15px 100px 15px !important; }
            .ticket { flex-direction: column; }
            .t-left, .t-right { flex: none; width: 100%; }
            .t-details { grid-template-columns: 1fr 1fr; }
            .line { display: none; }
            .ticket::before, .ticket::after { display: none; }
        }
        .content { display: none; }
        .content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="notebook">
        <main class="paper">
            <div id="loader" style="text-align:center; padding: 50px;">📡 正在連動雲端行程...</div>
            <section id="boarding" class="content">
                <div id="cover-display" class="cover-box" style="display:none;"><img id="cover-img" src=""></div>
                <h1 style="color:var(--main-theme);">✈️ 登機資訊</h1>
                <div id="render-boarding"></div>
            </section>
            <section id="luggage" class="content">
                <h1 style="color:#8b7355;">📦 行李清單</h1>
                <div id="render-luggage" class="luggage-grid"></div>
            </section>
            <section id="schedule" class="content">
                <h1 style="color:var(--pink-active);">📅 日程規劃</h1>
                <div id="render-schedule"></div>
            </section>
        </main>
        <nav class="tabs">
            <button class="tab active" onclick="switchTab(event, 'boarding')">登機資訊</button>
            <button class="tab" onclick="switchTab(event, 'luggage')">行李清單</button>
            <button class="tab tab-pink" onclick="switchTab(event, 'schedule')">日程規劃</button>
        </nav>
    </div>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbydcsyWyg8eqL-v4h7Bjxnup-csEGRs7qCdFWh5RAmoGlH975rdpmUJ2XIG75Iwb7pE/exec";
        let store = { boarding: [], luggage: [], schedule: [], config: [] };

        async function fetchCloudData() {
            const loader = document.getElementById('loader');
            try {
                const response = await fetch(API_URL + "?t=" + new Date().getTime());
                store = await response.json();
                renderBoarding();
                renderLuggage();
                renderSchedule();
                loader.style.display = 'none';
                switchTab(null, 'boarding');
            } catch (error) {
                console.error(error);
                loader.innerHTML = "❌ 載入失敗，請確認 API 網址。";
            }
        }

        function renderBoarding() {
            const coverData = (store.config || []).find(c => c.key === 'cover');
            if (coverData && coverData.value) {
                document.getElementById('cover-img').src = coverData.value;
                document.getElementById('cover-display').style.display = 'block';
            }
            document.getElementById('render-boarding').innerHTML = (store.boarding || []).map(b => `
                <div class="ticket"><div class="line"></div><div class="t-left">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
                ${b.logo ? `<img src="${b.logo}" style="height:18px;">` : '✈️'}
                <span style="font-size:0.8em;color:var(--text-sub);font-weight:bold;">${b.f || ''}</span></div>
                <div class="t-route"><div class="t-city">${b.from || ''}</div><div style="opacity:0.2;">——</div><div class="t-city">${b.to || ''}</div></div>
                <div class="t-details">
                <div><span class="t-label">DEPARTURE</span><span class="t-val">${b.t1 || ''}</span></div>
                <div><span class="t-label">ARRIVAL</span><span class="t-val">${b.t2 || ''}</span></div>
                <div><span class="t-label">TERM</span><span class="t-val">${b.term || '-'}</span></div></div></div>
                <div class="t-right"><span class="t-label">BAGGAGE</span><span class="t-val">🧳 ${b.baggage || '-'}</span>
                <div style="margin-top:10px;"><span class="t-label">GATE</span><span class="t-val" style="color:var(--main-theme);">Boarding</span></div></div></div>
            `).join('') || '<p style="text-align:center;color:#ccc;">尚無航班資料</p>';
        }

        function renderLuggage() {
            const lMap = {};
            (store.luggage || []).forEach(l => { if(!lMap[l.cat]) lMap[l.cat] = []; lMap[l.cat].push(l.item); });
            document.getElementById('render-luggage').innerHTML = Object.keys(lMap).map(cat => `
                <div class="luggage-cat"><strong>🏷️ ${cat}</strong><hr style="border:0;border-top:1px solid #eee;margin:12px 0;">
                ${lMap[cat].map(i => `<div class="luggage-item"><input type="checkbox"> <span>${i}</span></div>`).join('')}</div>
            `).join('') || '<p style="text-align:center;color:#ccc;">行李清單是空的</p>';
        }

        function renderSchedule() {
            const sMap = {};
            (store.schedule || []).sort((a,b)=>String(a.ts).localeCompare(String(b.ts))).forEach(s => { if(!sMap[s.day]) sMap[s.day] = []; sMap[s.day].push(s); });
            document.getElementById('render-schedule').innerHTML = Object.keys(sMap).sort().map(day => {
                let html = `<div class="day-title">${day}</div><div class="sched-container">`;
                sMap[day].forEach((s, idx) => {
                    const mapUrl = `http://googleusercontent.com/maps.google.com/?q=${encodeURIComponent(s.loc)}`;
                    html += `<div class="sched-item"><div class="time-box">${s.ts}${s.te ? `<br>|<br>${s.te}` : ''}</div>
                    <div class="content-box"><div style="font-weight:bold;">${s.desc}</div>
                    ${s.loc ? `<a href="${mapUrl}" target="_blank" class="loc-tag">📍 ${s.loc}</a>` : ''}</div></div>`;
                    if (idx < sMap[day].length - 1 && s.trans) {
                        html += `<div class="transit-row"><span>${s.trans}</span><span style="margin-left:10px;">預估：${s.dur || '-'}</span></div>`;
                    }
                });
                return html + `</div>`;
            }).join('') || '<p style="text-align:center;color:#ccc;">尚未規劃行程</p>';
        }

        function switchTab(e, id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            if(e) e.currentTarget.classList.add('active');
            else document.querySelector('.tab').classList.add('active');
            window.scrollTo(0, 0);
        }
        fetchCloudData();
    </script>
</body>
</html>
