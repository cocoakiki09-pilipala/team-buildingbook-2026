<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Building 旗艦版手冊 v2</title>
    <style>
        :root {
            --desk-bg: #dcdde1; --paper-bg: #f5f6fa; --main-theme: #84a59d;
            --pink-theme: #ffb7b2; --pink-active: #ff9aa2;
            --text-main: #2f3640; --text-sub: #7f8c8d; --accent-tan: #faf3e0;
        }
        /* 基礎樣式 */
        html { overflow-y: scroll; scroll-behavior: smooth; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--desk-bg); margin: 0; padding: 0; display: flex; justify-content: center; color: var(--text-main); }
        .notebook { display: flex; width: 100%; max-width: 1050px; min-height: 100vh; position: relative; }
        .paper { flex: 1; background: var(--paper-bg); padding: 35px; overflow-y: auto; z-index: 2; padding-bottom: 120px; box-sizing: border-box; }

        /* 封面與頁籤 */
        .cover-box { width: 100%; height: 220px; border-radius: 15px; overflow: hidden; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; }
        .tabs { display: flex; flex-direction: column; gap: 8px; margin-top: 50px; z-index: 1; }
        .tab { writing-mode: vertical-rl; text-orientation: mixed; padding: 30px 12px; border: none; background: #b2bec3; color: white; cursor: pointer; border-radius: 0 15px 15px 0; transition: 0.3s; position: relative; left: -2px; font-weight: bold; font-size: 1.1em; }
        .tab.active { background: var(--main-theme); padding-left: 20px; z-index: 3; }
        .tab-pink.active { background-color: var(--pink-active) !important; }

        /* 機票樣式 */
        .ticket { background: white; border-radius: 20px; display: flex; position: relative; margin-bottom: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); min-height: 150px; }
        .line { position: absolute; left: 70%; top: 15px; bottom: 15px; border-left: 2px dashed #ececec; transform: translateX(-50%); }
        .ticket::before, .ticket::after { content: ''; position: absolute; width: 24px; height: 24px; background: var(--paper-bg); border-radius: 50%; left: 70%; transform: translateX(-50%); z-index: 5; }
        .ticket::before { top: -12px; } .ticket::after { bottom: -12px; }
        .t-left { flex: 0 0 70%; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
        .t-route { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
        .t-city { font-size: 1.6em; font-weight: bold; color: var(--main-theme); }
        .t-details { display: flex; justify-content: space-between; }
        .t-label { font-size: 0.7em; color: var(--text-sub); display: block; margin-bottom: 4px; }
        .t-val { font-size: 1.1em; font-weight: bold; }
        .t-right { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: center; background: #fafafa; border-radius: 0 20px 20px 0; text-align: center; }

        /* 行程與交通 */
        .day-title { background: var(--main-theme); color: white; padding: 12px 20px; border-radius: 10px 10px 0 0; margin-top: 25px; font-weight: bold; }
        .sched-container { background: white; border-radius: 0 0 15px 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .sched-item { display: flex; align-items: stretch; border-bottom: 1px solid #f0f0f0; }
        .time-box { width: 90px; padding: 15px; background: #fcfcfc; border-right: 1px solid #eee; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: var(--main-theme); font-weight: bold; font-size: 0.85em; }
        .content-box { flex: 1; padding: 15px 20px; }
        .loc-tag { display: inline-block; background: var(--accent-tan); color: #8b7355; padding: 4px 10px; border-radius: 6px; font-size: 0.85em; margin-top: 8px; text-decoration: none; border: 1px solid #e2d1b3; transition: 0.2s; }
        .loc-tag:hover { background: #e2d1b3; }
        .transit-row { display: flex; align-items: center; padding: 12px 20px; background: #f8f9fa; font-size: 0.85em; color: var(--text-sub); border-bottom: 1px solid #eee; }
        .map-link { margin-left: auto; color: #4285F4; font-weight: bold; text-decoration: none; }

        /* 行李清單 */
        .luggage-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .luggage-cat { background: white; border: 1px solid #eee; padding: 20px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .luggage-item { display: flex; align-items: center; margin-bottom: 8px; cursor: pointer; }
        .luggage-item input { width: 18px; height: 18px; margin-right: 10px; cursor: pointer; }
        .checked-text { text-decoration: line-through; color: var(--text-sub); }

        /* 管理後台樣式優化 */
        .admin-box { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #ddd; }
        .admin-list { background: #f9f9f9; padding: 10px; border-radius: 8px; font-size: 0.85em; margin-bottom: 15px; max-height: 200px; overflow-y: auto; }
        .admin-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; align-items: center; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn-add { width: 100%; padding: 12px; background: var(--main-theme); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add:hover { opacity: 0.9; }
        .del-btn { background: #ff4757; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        /* 切換動畫與 RWD */
        .content { display: none; }
        .content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .tabs { flex-direction: row; position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; margin-top: 0; background: white; box-shadow: 0 -3px 15px rgba(0,0,0,0.1); }
            .tab { writing-mode: horizontal-tb; flex: 1; border-radius: 0; padding: 10px 0; font-size: 0.9em; left: 0; text-align: center; color: #666; background: white; }
            .tab.active { background: var(--main-theme); color: white; padding-left: 0; }
            .paper { padding: 20px 15px 120px 15px; }
            .ticket { flex-direction: column; }
            .t-left, .t-right { flex: none; width: 100%; }
            .line { left: 15px; right: 15px; top: auto; bottom: 85px; width: auto; height: 0; border-top: 2px dashed #ececec; transform: none; }
            .ticket::before, .ticket::after { top: auto; bottom: 73px; left: -12px; transform: none; }
            .ticket::after { left: auto; right: -12px; }
        }
    </style>
</head>
<body>

    <div class="notebook">
        <main class="paper">
            <section id="boarding" class="content active">
                <div id="cover-display" class="cover-box" style="display:none;"><img id="cover-img" src="" alt="封面"></div>
                <h1 style="color:var(--main-theme);">✈️ 登機資訊</h1>
                <div id="render-boarding"></div>
            </section>

            <section id="luggage" class="content">
                <h1 style="color:#8b7355;">📦 行李清單</h1>
                <div id="render-luggage" class="luggage-grid"></div>
            </section>

            <section id="schedule" class="content">
                <h1 style="color:var(--pink-active);">📅 日程規劃</h1>
                <div id="render-schedule"></div>
            </section>

            <section id="admin" class="content">
                <h1 style="border-bottom: 2px solid #ddd; padding-bottom: 10px;">⚙️ 系統管理</h1>
                
                <div class="admin-box">
                    <h3>🖼 封面照管理</h3>
                    <input type="file" accept="image/*" onchange="uploadCover(this)">
                </div>

                <div class="admin-box">
                    <h3>✈️ 機票管理</h3>
                    <div id="edit-boarding" class="admin-list"></div>
                    <div class="input-row">
                        <input type="text" id="in-f" placeholder="航班編號 (例: BR198)">
                        <input type="text" id="in-from" placeholder="出發地 (例: TPE)">
                        <input type="text" id="in-to" placeholder="目的地 (例: NRT)">
                        <input type="text" id="in-t1" placeholder="起飛 (11:35)">
                        <input type="text" id="in-t2" placeholder="抵達 (15:20)">
                    </div>
                    <button class="btn-add" onclick="pushData('boarding')">＋ 新增機票</button>
                </div>

                <div class="admin-box">
                    <h3>📦 行李管理</h3>
                    <div id="edit-luggage" class="admin-list"></div>
                    <div class="input-row">
                        <select id="in-l-cat">
                            <option value="重要文件">重要文件</option>
                            <option value="個人衣物">個人衣物</option>
                            <option value="3C 產品">3C 產品</option>
                            <option value="個人藥品">個人藥品</option>
                        </select>
                        <input type="text" id="in-l-item" placeholder="物品名稱">
                    </div>
                    <button class="btn-add" onclick="pushData('luggage')">＋ 新增項目</button>
                </div>

                <div class="admin-box">
                    <h3>📅 日程規劃管理</h3>
                    <div id="edit-schedule" class="admin-list"></div>
                    <div class="input-row">
                        <select id="in-s-day">
                            <option value="Day 1">Day 1</option><option value="Day 2">Day 2</option>
                            <option value="Day 3">Day 3</option><option value="Day 4">Day 4</option>
                        </select>
                        <input type="text" id="in-s-loc" placeholder="地點名稱 (Google地圖用)">
                    </div>
                    <div class="input-row">
                        <input type="text" id="in-s-ts" placeholder="開始時間 (09:00)">
                        <input type="text" id="in-s-te" placeholder="結束時間 (10:30)">
                    </div>
                    <input type="text" id="in-s-desc" placeholder="行程描述" style="margin-bottom:10px; width:100%;">
                    <div class="input-row">
                        <select id="in-s-trans">
                            <option value="">無銜接交通</option>
                            <option value="🚗 駕車">🚗 駕車</option>
                            <option value="🚶 步行">🚶 步行</option>
                            <option value="🚌 大眾運輸">🚌 大眾運輸</option>
                        </select>
                        <input type="text" id="in-s-dur" placeholder="預估時間 (例: 30分鐘)">
                    </div>
                    <button class="btn-add" onclick="pushData('schedule')">＋ 新增行程</button>
                </div>
                <button onclick="clearAllData()" style="background:#eee; border:none; color: #999; padding:10px; border-radius:5px; cursor:pointer;">清空所有資料</button>
            </section>
        </main>

        <nav class="tabs">
            <button class="tab active" onclick="switchTab(event, 'boarding')">登機資訊</button>
            <button class="tab" onclick="switchTab(event, 'luggage')">行李清單</button>
            <button class="tab tab-pink" onclick="switchTab(event, 'schedule')">日程規劃</button>
            <button class="tab" style="background:#cc8e35" onclick="switchTab(event, 'admin')">系統管理</button>
        </nav>
    </div>

    <script>
        // 初始化資料，為資料結構增加 id 以利精準操作
        let store = JSON.parse(localStorage.getItem('tb_pro_v1')) || { 
            cover: "", 
            boarding: [], 
            luggage: [], 
            schedule: [] 
        };

        function switchTab(e, id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
            document.querySelector('.paper').scrollTop = 0;
        }

        function uploadCover(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { store.cover = e.target.result; saveAndRender(); };
                reader.readAsDataURL(file);
            }
        }

        function pushData(type) {
            const id = Date.now(); // 使用時間戳記作為唯一識別碼
            if(type === 'boarding') {
                const f = document.getElementById('in-f').value;
                const from = document.getElementById('in-from').value;
                const to = document.getElementById('in-to').value;
                const t1 = document.getElementById('in-t1').value;
                const t2 = document.getElementById('in-t2').value;
                if(f && from && to) store.boarding.push({id, f, from, to, t1, t2});
            } else if(type === 'luggage') {
                const cat = document.getElementById('in-l-cat').value;
                const item = document.getElementById('in-l-item').value;
                if(item) store.luggage.push({id, cat, item, checked: false});
            } else if(type === 'schedule') {
                const day = document.getElementById('in-s-day').value;
                const loc = document.getElementById('in-s-loc').value;
                const ts = document.getElementById('in-s-ts').value;
                const te = document.getElementById('in-s-te').value;
                const desc = document.getElementById('in-s-desc').value;
                const trans = document.getElementById('in-s-trans').value;
                const dur = document.getElementById('in-s-dur').value;
                if(ts && desc) store.schedule.push({ id, day, loc, ts, te, desc, trans, dur });
            }
            saveAndRender();
            // 清空輸入框
            document.querySelectorAll(`#admin section[id="${type}"] input[type="text"]`).forEach(i => i.value = '');
        }

        function removeData(type, id) {
            store[type] = store[type].filter(item => item.id !== id);
            saveAndRender();
        }

        function toggleLuggage(id) {
            const item = store.luggage.find(l => l.id === id);
            if(item) {
                item.checked = !item.checked;
                saveAndRender();
            }
        }

        function clearAllData() {
            if(confirm("確定要刪除所有資料嗎？此操作無法還原。")) {
                store = { cover: "", boarding: [], luggage: [], schedule: [] };
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('tb_pro_v1', JSON.stringify(store));
            
            // 1. 渲染封面
            const coverBox = document.getElementById('cover-display');
            if(store.cover) { 
                document.getElementById('cover-img').src = store.cover; 
                coverBox.style.display = 'block'; 
            } else {
                coverBox.style.display = 'none';
            }

            // 2. 渲染機票
            document.getElementById('render-boarding').innerHTML = store.boarding.length ? store.boarding.map(b => `
                <div class="ticket">
                    <div class="line"></div>
                    <div class="t-left">
                        <div class="t-route">
                            <div class="t-city">${b.from}</div>
                            <div style="color:var(--main-theme); opacity: 0.3;">✈️</div>
                            <div class="t-city">${b.to}</div>
                        </div>
                        <div class="t-details">
                            <div><span class="t-label">DEPARTURE</span><span class="t-val">${b.t1}</span></div>
                            <div><span class="t-label">ARRIVAL</span><span class="t-val">${b.t2}</span></div>
                        </div>
                    </div>
                    <div class="t-right">
                        <span class="t-label">FLIGHT</span>
                        <span class="t-val" style="color:var(--main-theme)">${b.f}</span>
                    </div>
                </div>
            `).join('') : '<p style="color:#ccc; text-align:center;">暫無機票資訊</p>';

            // 3. 渲染行李 (優化勾選狀態)
            const lMap = {}; 
            store.luggage.forEach(l => { if(!lMap[l.cat]) lMap[l.cat]=[]; lMap[l.cat].push(l); });
            document.getElementById('render-luggage').innerHTML = Object.keys(lMap).length ? Object.keys(lMap).map(cat => `
                <div class="luggage-cat">
                    <strong style="color:var(--main-theme)">🏷️ ${cat}</strong>
                    <hr style="border:0;border-top:1px solid #eee;margin:12px 0;">
                    ${lMap[cat].map(l => `
                        <div class="luggage-item" onclick="toggleLuggage(${l.id})">
                            <input type="checkbox" ${l.checked ? 'checked' : ''}> 
                            <span class="${l.checked ? 'checked-text' : ''}">${l.item}</span>
                        </div>
                    `).join('')}
                </div>
            `).join('') : '<p style="color:#ccc; text-align:center; grid-column: 1/-1;">清單目前是空的</p>';

            // 4. 渲染行程 (修復 Google Maps 連結)
            const sMap = {}; 
            store.schedule.sort((a,b)=>a.ts.localeCompare(b.ts)).forEach(s => { if(!sMap[s.day]) sMap[s.day]=[]; sMap[s.day].push(s); });
            document.getElementById('render-schedule').innerHTML = Object.keys(sMap).length ? Object.keys(sMap).sort().map(day => {
                let html = `<div class="day-title">${day}</div><div class="sched-container">`;
                sMap[day].forEach((s, idx) => {
                    const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.loc)}`;
                    html += `
                    <div class="sched-item">
                        <div class="time-box">${s.ts}${s.te ? `<br><span style="font-weight:normal;opacity:0.5;">|</span><br>${s.te}` : ''}</div>
                        <div class="content-box">
                            <div style="font-weight:bold; font-size:1.05em;">${s.desc}</div>
                            ${s.loc ? `<a href="${mapUrl}" target="_blank" class="loc-tag">📍 ${s.loc}</a>` : ''}
                        </div>
                    </div>`;
                    
                    if (idx < sMap[day].length - 1 && s.trans) {
                        const nextLoc = sMap[day][idx+1].loc;
                        const navUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(s.loc)}&destination=${encodeURIComponent(nextLoc)}`;
                        html += `
                        <div class="transit-row">
                            <span>${s.trans}</span>
                            <span style="margin-left:10px; opacity:0.7;">⏱️ ${s.dur}</span>
                            ${s.loc && nextLoc ? `<a href="${navUrl}" target="_blank" class="map-link">導航 〉</a>` : ''}
                        </div>`;
                    }
                });
                return html + `</div>`;
            }).join('') : '<p style="color:#ccc; text-align:center;">尚未規劃行程</p>';

            // 5. 更新管理清單
            document.getElementById('edit-boarding').innerHTML = store.boarding.map(b=>`<div class="admin-item"><span>${b.f} (${b.from}✈️${b.to})</span><button class="del-btn" onclick="removeData('boarding',${b.id})">✖</button></div>`).join('') || '無';
            document.getElementById('edit-luggage').innerHTML = store.luggage.map(l=>`<div class="admin-item"><span>[${l.cat}] ${l.item}</span><button class="del-btn" onclick="removeData('luggage',${l.id})">✖</button></div>`).join('') || '無';
            document.getElementById('edit-schedule').innerHTML = store.schedule.map(s=>`<div class="admin-item"><span>[${s.day}] ${s.ts} ${s.desc}</span><button class="del-btn" onclick="removeData('schedule',${s.id})">✖</button></div>`).join('') || '無';
        }

        // 初始啟動
        saveAndRender();
    </script>
</body>
</html>
